name: Manual-MT Merge and Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  # ここでZIPの名前の先頭部分を指定
  PACK_NAME_PREFIX: "GTO0.5.4-JP-Twister-And-Gemini-byKirikemo"

permissions:
  contents: write
  actions: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (MT)
        uses: actions/checkout@v4
        with:
          path: mt-repo

      - name: Get latest hash
        id: remote-hash
        run: |
          HASH=$(git ls-remote https://github.com/twister716/GregTech-Odessey-JP-Translation.git HEAD | awk '{ print $1 }')
          echo "latest_hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache hash
        id: cache-hash
        uses: actions/cache@v4
        with:
          path: last_hash.txt
          key: manual-hash-${{ steps.remote-hash.outputs.latest_hash }}
          restore-keys: |
            manual-hash-

      - name: Check update
        id: check
        shell: bash
        run: |
          REMOTE_HASH="${{ steps.remote-hash.outputs.latest_hash }}"
          if [ -f last_hash.txt ] && [ "$(cat last_hash.txt)" == "$REMOTE_HASH" ]; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Manual repo has not changed since last build."
          else
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "$REMOTE_HASH" > last_hash.txt
          fi

      - name: Checkout Manual repo
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: twister716/GregTech-Odessey-JP-Translation
          path: manual-repo

      - name: Set up Python & env
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Merge JSONs
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        run: python mt-repo/.github/scripts/merge_lang.py

      - name: Create Zip
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # 日付を取得して環境変数へ (例: MyCustomTranslation-20260218)
          ZIP_NAME="${{ env.PACK_NAME_PREFIX }}-$(date +'%Y%m%d')"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          cd output
          zip -r ../$ZIP_NAME.zip .
          cd ..

      - name: GitHub Release
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}.zip
          tag_name: release-${{ env.ZIP_NAME }}
          name: "Release ${{ env.ZIP_NAME }}"
          body: |
            Automatically merged Japanese translations.
            Source (Manual): twister716/GregTech-Odessey-JP-Translation
            Source (Machine): Gemini-generated assets in this repo.
          draft: false
          prerelease: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases
        if: steps.check.outputs.update_needed == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 最新3件を残して古いリリースを削除 (タグを含む)
          old_releases=$(gh release list --limit 10 --repo ${{ github.repository }} | awk '{print $1}' | tail -n +4)
          
          if [ -n "$old_releases" ]; then
            for tag in $old_releases; do
              echo "Deleting old release and tag: $tag"
              gh release delete "$tag" --yes --repo ${{ github.repository }} --cleanup-tag || true
            done
          fi